<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Sheet</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #edf6fb;
        color: #0c2438;
      }
      .wrap {
        width: min(1600px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid #d7e5ef;
        border-radius: 14px;
        padding: 12px;
        display: grid;
        gap: 10px;
        min-height: 150px;
        align-content: start;
        box-shadow: 0 8px 24px -20px rgba(0, 83, 128, 0.4);
      }
      .icon-box {
        min-height: 72px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(0, 121, 196, 0.04), rgba(0, 190, 199, 0.08)),
          #f9fcff;
        border-radius: 12px;
      }
      .icon-box img {
        max-width: 52px;
        max-height: 52px;
      }
      .meta {
        font-size: 12px;
        line-height: 1.35;
        word-break: break-word;
      }
      .meta strong {
        display: block;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Untitled_icon sheet</h1>
      <div class="grid" id="grid"></div>
    </div>
    <script>
      const icons = [
        ["icon-01.svg", "Component 1-1.svg"],
        ["icon-02.svg", "Component 1-10.svg"],
        ["icon-03.svg", "Component 1-11.svg"],
        ["icon-04.svg", "Component 1-12.svg"],
        ["icon-05.svg", "Component 1-13.svg"],
        ["icon-06.svg", "Component 1-14.svg"],
        ["icon-07.svg", "Component 1-15.svg"],
        ["icon-08.svg", "Component 1-2.svg"],
        ["icon-09.svg", "Component 1-3.svg"],
        ["icon-10.svg", "Component 1-4.svg"],
        ["icon-11.svg", "Component 1-5.svg"],
        ["icon-12.svg", "Component 1-6.svg"],
        ["icon-13.svg", "Component 1-7.svg"],
        ["icon-14.svg", "Component 1-8.svg"],
        ["icon-15.svg", "Component 1-9.svg"],
        ["icon-16.svg", "Component 1.svg"],
        ["icon-17.svg", "Group 3.svg"],
        ["icon-18.svg", "Group 9.svg"],
        ["icon-19.svg", "Mask.svg"],
        ["icon-20.svg", "SVG-1.svg"],
        ["icon-21.svg", "SVG-10.svg"],
        ["icon-22.svg", "SVG-11.svg"],
        ["icon-23.svg", "SVG-12.svg"],
        ["icon-24.svg", "SVG-13.svg"],
        ["icon-25.svg", "SVG-14.svg"],
        ["icon-26.svg", "SVG-15.svg"],
        ["icon-27.svg", "SVG-16.svg"],
        ["icon-28.svg", "SVG-17.svg"],
        ["icon-29.svg", "SVG-18.svg"],
        ["icon-30.svg", "SVG-19.svg"],
        ["icon-31.svg", "SVG-2.svg"],
        ["icon-32.svg", "SVG-20.svg"],
        ["icon-33.svg", "SVG-21.svg"],
        ["icon-34.svg", "SVG-22.svg"],
        ["icon-35.svg", "SVG-23.svg"],
        ["icon-36.svg", "SVG-24.svg"],
        ["icon-37.svg", "SVG-25.svg"],
        ["icon-38.svg", "SVG-3.svg"],
        ["icon-39.svg", "SVG-4.svg"],
        ["icon-40.svg", "SVG-5.svg"],
        ["icon-41.svg", "SVG-6.svg"],
        ["icon-42.svg", "SVG-7.svg"],
        ["icon-43.svg", "SVG-8.svg"],
        ["icon-44.svg", "SVG-9.svg"],
        ["icon-45.svg", "SVG.svg"],
        ["icon-46.svg", "image.svg"],
        ["icon-47.svg", "lit$228702026 → SVG - lit$228702026.svg"],
        ["icon-48.svg", "logo ttsg1 1.svg"]
      ];

      const grid = document.getElementById("grid");

      icons.forEach(([file, original]) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="icon-box">
            <img src="assets/icons/${file}" alt="${original}">
          </div>
          <div class="meta">
            <strong>${file}</strong>
            <span>${original}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    </script>
  </body>
</html>
